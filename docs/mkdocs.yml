site_name: TripSignal — Internal Docs
site_description: Technical documentation for the TripSignal platform
site_url: https://tripsignal.ca/admin/docs-static/

theme:
  name: material
  palette:
    scheme: default
    primary: black
    accent: orange
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md

extra:
  generator: false
